<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创艺塑胶 · 塑料原料与制品选购</title>
<style>
  :root{
    --bg: #EFEDF4;
    --panel: #FFFFFF;
    --ink: #211D2E;
    --ink-soft: #6B6378;
    --navy: #3D3166;
    --navy-deep: #261F45;
    --amber: #FF6B4D;
    --amber-deep: #E14B2E;
    --line: #DDD8E6;
    --mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
    --disp: 'Space Grotesk', 'Archivo', sans-serif;
    --body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;

    --c-pp: #2E7D6B;
    --c-pe: #2E6B9E;
    --c-pvc: #8A4FB0;
    --c-abs: #B0432F;
    --c-pc: #1A6E7A;
    --c-eva: #C2932E;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--body);
    line-height:1.5;
    padding-bottom:90px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  a, button{ font-family:inherit; cursor:pointer; }

  /* ===== Top bar ===== */
  .topbar{
    background:var(--navy-deep);
    color:#EAF2F1;
    padding:10px 28px;
    font-size:12.5px;
    display:flex;
    justify-content:space-between;
    letter-spacing:.02em;
    font-family:var(--mono);
  }
  .topbar span b{ color:var(--amber); font-weight:600; }

  header.hero{
    background:linear-gradient(155deg, var(--navy) 0%, var(--navy-deep) 62%);
    color:#fff;
    padding:54px 28px 64px;
    position:relative;
    overflow:hidden;
  }
  header.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.045) 0 1px, transparent 1px 42px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.045) 0 1px, transparent 1px 42px);
    pointer-events:none;
  }
  .hero-inner{ max-width:1180px; margin:0 auto; position:relative; }
  .eyebrow{
    font-family:var(--mono);
    font-size:12.5px;
    color:var(--amber);
    letter-spacing:.12em;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
  }
  .eyebrow::before{
    content:"";
    width:7px; height:7px;
    background:var(--amber);
    border-radius:50%;
    display:inline-block;
  }
  h1.title{
    font-family:var(--disp);
    font-weight:600;
    font-size:clamp(30px, 4.2vw, 48px);
    letter-spacing:-.01em;
    max-width:780px;
    margin-bottom:18px;
  }
  .hero p.sub{
    max-width:560px;
    color:#C9D6D2;
    font-size:15.5px;
    margin-bottom:30px;
  }
  .hero-stats{
    display:flex;
    gap:36px;
    flex-wrap:wrap;
  }
  .stat b{
    font-family:var(--mono);
    font-size:24px;
    color:#fff;
    display:block;
  }
  .stat span{
    font-size:12px;
    color:#9FB3AE;
    letter-spacing:.03em;
  }

  /* ===== Filter bar ===== */
  .filterbar{
    max-width:1180px;
    margin:-28px auto 0;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 22px;
    position:relative;
    z-index:5;
    display:flex;
    gap:18px;
    align-items:center;
    flex-wrap:wrap;
    box-shadow:0 16px 40px -22px rgba(14,39,51,0.35);
  }
  .search-box{
    flex:1 1 240px;
    display:flex;
    align-items:center;
    border:1px solid var(--line);
    border-radius:7px;
    padding:9px 12px;
    gap:8px;
  }
  .search-box input{
    border:none; outline:none; flex:1; font-size:14px; color:var(--ink); background:transparent;
  }
  .search-box svg{ width:16px; height:16px; color:var(--ink-soft); flex-shrink:0; }

  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink-soft);
    font-size:13px;
    padding:7px 14px;
    border-radius:20px;
    transition:border-color .15s, color .15s, background .15s;
    white-space:nowrap;
  }
  .chip[data-active="true"]{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
  }
  .chip:hover{ border-color:var(--navy); color:var(--navy); }
  .chip[data-active="true"]:hover{ color:#fff; }

  .sort-select{
    border:1px solid var(--line);
    border-radius:7px;
    padding:9px 10px;
    font-size:13px;
    color:var(--ink-soft);
    background:#fff;
  }

  /* ===== Section ===== */
  .section{ max-width:1180px; margin:0 auto; padding:40px 28px 0; }
  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:18px;
  }
  .section-head h2{
    font-family:var(--disp);
    font-size:20px;
    font-weight:600;
  }
  .section-head .count{
    font-family:var(--mono);
    font-size:12.5px;
    color:var(--ink-soft);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
    gap:18px;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:0 18px 32px -20px rgba(14,39,51,0.3);
  }
  .card-media{
    position:relative;
    aspect-ratio:4/3;
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.035) 0 2px, transparent 2px 14px);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .card-media img{
    width:100%; height:100%;
    object-fit:cover;
  }
  .card-media .swatch{
    width:64px; height:64px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--mono);
    font-weight:700;
    font-size:15px;
    color:#fff;
    box-shadow:inset 0 -10px 18px rgba(0,0,0,0.18), 0 6px 16px -8px rgba(0,0,0,0.35);
  }
  .card-media .tag-stock{
    position:absolute;
    top:10px; left:10px;
    font-family:var(--mono);
    font-size:10.5px;
    padding:3px 8px;
    border-radius:5px;
    background:rgba(255,255,255,0.92);
    color:var(--ink-soft);
    letter-spacing:.02em;
  }
  .card-media .tag-stock[data-low="true"]{ color:var(--amber-deep); }
  .card-body{ padding:16px; display:flex; flex-direction:column; gap:8px; flex:1; }
  .card-cat{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.06em;
    color:var(--ink-soft);
    text-transform:uppercase;
  }
  .card-name{ font-size:15.5px; font-weight:600; color:var(--ink); }
  .card-spec{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
    display:flex;
    flex-wrap:wrap;
    gap:5px 10px;
  }
  .card-spec span{ white-space:nowrap; }
  .card-foot{
    margin-top:auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-top:10px;
    border-top:1px dashed var(--line);
  }
  .card-price{ font-family:var(--mono); font-weight:700; font-size:15px; color:var(--navy); }
  .card-price small{ font-weight:400; font-size:11px; color:var(--ink-soft); }
  .btn-add{
    border:1px solid var(--navy);
    color:var(--navy);
    background:#fff;
    font-size:12.5px;
    padding:7px 13px;
    border-radius:6px;
    transition:background .15s, color .15s;
  }
  .btn-add:hover{ background:var(--navy); color:#fff; }
  .btn-add[data-added="true"]{
    background:var(--amber);
    border-color:var(--amber);
    color:#fff;
  }
  .card-name-link{ cursor:pointer; }
  .card-name-link:hover{ color:var(--amber-deep); }

  .empty-state{
    text-align:center;
    padding:60px 0;
    color:var(--ink-soft);
    font-size:14px;
  }

  /* ===== Selection bar ===== */
  .selbar{
    position:fixed;
    bottom:0; left:0; right:0;
    background:var(--navy-deep);
    color:#fff;
    padding:14px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index:50;
    box-shadow:0 -10px 30px rgba(0,0,0,0.25);
    transform:translateY(0);
    transition:transform .25s ease;
  }
  .selbar[data-empty="true"]{ transform:translateY(100%); }
  .selbar .left{ display:flex; align-items:center; gap:16px; }
  .selbar .count-badge{
    background:var(--amber);
    color:#fff;
    font-family:var(--mono);
    font-weight:700;
    font-size:13px;
    width:28px; height:28px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .selbar .preview{ display:flex; gap:6px; }
  .selbar .preview .dot{
    width:8px;height:8px;border-radius:50%;
  }
  .selbar-link{ color:#C9D6D2; font-size:13px; text-decoration:underline; text-decoration-color:rgba(255,255,255,0.3); }
  .selbar-link:hover{ color:#fff; }
  .btn-inquire{
    background:var(--amber);
    color:#fff;
    border:none;
    padding:11px 22px;
    border-radius:7px;
    font-size:14px;
    font-weight:600;
    letter-spacing:.01em;
    transition:background .15s;
  }
  .btn-inquire:hover{ background:var(--amber-deep); }

  /* ===== Modal: detail ===== */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(14,39,51,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:24px;
  }
  .modal-overlay[data-open="true"]{ display:flex; }
  .modal{
    background:#fff;
    border-radius:12px;
    max-width:780px;
    width:100%;
    max-height:88vh;
    overflow-y:auto;
    display:grid;
    grid-template-columns:280px 1fr;
  }
  @media (max-width:640px){ .modal{ grid-template-columns:1fr; } }
  .modal-media{
    background:repeating-linear-gradient(45deg, rgba(0,0,0,0.035) 0 2px, transparent 2px 14px);
    display:flex; align-items:center; justify-content:center;
    min-height:220px;
    overflow:hidden;
  }
  .modal-media img{
    width:100%; height:100%;
    object-fit:cover;
  }
  .modal-media .swatch{
    width:110px; height:110px; border-radius:20px;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-weight:700; font-size:22px; color:#fff;
    box-shadow:inset 0 -14px 24px rgba(0,0,0,0.18), 0 8px 20px -10px rgba(0,0,0,0.35);
  }
  .modal-content{ padding:26px 28px; }
  .modal-close{
    position:absolute; top:16px; right:16px;
    width:30px; height:30px;
    border-radius:50%;
    border:1px solid var(--line);
    background:#fff;
    font-size:15px;
    color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center;
  }
  .modal-close:hover{ color:var(--ink); border-color:var(--ink-soft); }
  .modal-cat{ font-family:var(--mono); font-size:11.5px; letter-spacing:.06em; color:var(--ink-soft); text-transform:uppercase; }
  .modal h3{ font-family:var(--disp); font-size:22px; margin:6px 0 14px; }
  .modal-table{ width:100%; border-collapse:collapse; margin-bottom:18px; }
  .modal-table tr{ border-bottom:1px solid var(--line); }
  .modal-table td{ padding:8px 0; font-size:13.5px; }
  .modal-table td:first-child{ color:var(--ink-soft); width:90px; font-family:var(--mono); font-size:12px; }
  .modal-desc{ font-size:13.5px; color:var(--ink-soft); line-height:1.7; margin-bottom:20px; }
  .modal-actions{ display:flex; gap:10px; }
  .modal-actions .btn-add{ flex:1; text-align:center; padding:10px; }

  /* focus visibility */
  button:focus-visible, input:focus-visible, .chip:focus-visible, .card-name-link:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:2px;
  }

  footer{
    max-width:1180px; margin:60px auto 0; padding:24px 28px 40px;
    color:var(--ink-soft); font-size:12.5px;
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;
    border-top:1px solid var(--line);
  }
</style>
</head>

function loadProducts(){
  try{
    const raw = localStorage.getItem('cy_products');
    if(raw){
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  }catch(e){}
  return DEFAULT_PRODUCTS;
}

const PRODUCTS = loadProducts().filter(p => p.status !== 'off');

function stockLabel(p){
  if(p.stock === null || p.stock === undefined) return '按需定制';
  if(p.stock <= 0) return '缺货';
  if(p.stock <= 20) return `仅剩${p.stock}件`;
  return '现货充足';
}
function stockLow(p){
  return p.stock !== null && p.stock !== undefined && p.stock > 0 && p.stock <= 20;
}

function isLightColor(hex){
  const c = hex.replace('#','');
  const r = parseInt(c.substring(0,2),16), g = parseInt(c.substring(2,4),16), b = parseInt(c.substring(4,6),16);
  return (r*299 + g*587 + b*114) / 1000 > 165;
}

let activeFilter = 'all';
let selection = new Set();

function chipList(){
  const cats = ['all', ...Object.keys(COLOR_FAMILIES)];
  return cats.map(c => {
    const label = c === 'all' ? '全部色系' : COLOR_FAMILIES[c].label;
    return `<button class="chip" data-cat="${c}" data-active="${c===activeFilter}">${label}</button>`;
  }).join('');
}

function renderChips(){
  document.getElementById('chipRow').innerHTML = chipList();
  document.querySelectorAll('.chip').forEach(el=>{
    el.addEventListener('click', ()=>{
      activeFilter = el.dataset.cat;
      renderChips();
      renderGrid();
    });
  });
}

function getFiltered(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let list = PRODUCTS.filter(p => activeFilter === 'all' || p.family === activeFilter);
  if(q){
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.code.toLowerCase().includes(q) ||
      p.type.toLowerCase().includes(q) ||
      COLOR_FAMILIES[p.family].label.toLowerCase().includes(q)
    );
  }
  if(sort === 'price-asc') list = [...list].sort((a,b)=>a.price-b.price);
  if(sort === 'price-desc') list = [...list].sort((a,b)=>b.price-a.price);
  return list;
}

function cardTemplate(p){
  const fam = COLOR_FAMILIES[p.family];
  const added = selection.has(p.id);
  const textColor = isLightColor(p.hex) ? '#3A3A3A' : '#FFFFFF';
  const mediaInner = p.img
    ? `<img src="${p.img}" alt="${p.name}" loading="lazy" />`
    : `<div class="swatch" style="background:${p.hex}; color:${textColor}">${p.code}</div>`;
  const priceHtml = p.price > 0
    ? `<div class="card-price">¥${p.price.toFixed(1)} <small>/${p.unit.replace('元/','')}</small></div>`
    : `<div class="card-price">${p.unit} <small>${stockLabel(p)}</small></div>`;
  return `
  <div class="card" data-id="${p.id}">
    <div class="card-media">
      <span class="tag-stock" data-low="${stockLow(p)}">${stockLabel(p)}</span>
      ${mediaInner}
    </div>
    <div class="card-body">
      <div class="card-cat">${fam.label} · ${p.type}</div>
      <div class="card-name card-name-link" tabindex="0" data-open="${p.id}">${p.name}</div>
      <div class="card-spec">
        ${p.specs.map(s=>`<span>${s[0]} ${s[1]}</span>`).join('')}
      </div>
      <div class="card-foot">
        ${priceHtml}
        <button class="btn-add" data-id="${p.id}" data-added="${added}">${added ? '已加入' : '加入选品单'}</button>
      </div>
    </div>
  </div>`;
}

function renderGrid(){
  const list = getFiltered();
  const grid = document.getElementById('productGrid');
  const empty = document.getElementById('emptyState');
  document.getElementById('resultCount').textContent = `共 ${list.length} 项`;
  if(list.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = list.map(cardTemplate).join('');
  }
  grid.querySelectorAll('.btn-add').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      toggleSelect(btn.dataset.id);
    });
  });
  grid.querySelectorAll('[data-open]').forEach(el=>{
    el.addEventListener('click', ()=> openModal(el.dataset.open));
    el.addEventListener('keypress', (e)=>{ if(e.key==='Enter') openModal(el.dataset.open); });
  });
}

function toggleSelect(id){
  if(selection.has(id)) selection.delete(id); else selection.add(id);
  renderGrid();
  renderSelBar();
}

function renderSelBar(){
  const bar = document.getElementById('selBar');
  bar.dataset.empty = selection.size === 0;
  document.getElementById('selCount').textContent = selection.size;
  const preview = [...selection].slice(0,6).map(id=>{
    const p = PRODUCTS.find(x=>x.id===id);
    return `<span class="dot" style="background:${p.hex}"></span>`;
  }).join('');
  document.getElementById('selPreview').innerHTML = preview;
}

document.getElementById('clearSel').addEventListener('click', ()=>{
  selection.clear();
  renderGrid();
  renderSelBar();
});

document.getElementById('inquireBtn').addEventListener('click', ()=>{
  if(selection.size === 0) return;
  const items = [...selection].map(id=>{
    const p = PRODUCTS.find(x=>x.id===id);
    return {id:p.id, name:p.name, code:p.code, family:p.family, type:p.type, hex:p.hex, price:p.price, unit:p.unit, img:p.img||null};
  });
  try{
    localStorage.setItem('cy_checkout_items', JSON.stringify(items));
  }catch(e){}
  window.location.href = 'checkout.html';
});

function openModal(id){
  const p = PRODUCTS.find(x=>x.id===id);
  const fam = COLOR_FAMILIES[p.family];
  const added = selection.has(p.id);
  const textColor = isLightColor(p.hex) ? '#3A3A3A' : '#FFFFFF';
  const mediaInner = p.img
    ? `<img src="${p.img}" alt="${p.name}" />`
    : `<div class="swatch" style="background:${p.hex}; color:${textColor}">${p.code}</div>`;
  const priceHtml = p.price > 0
    ? `¥${p.price.toFixed(1)} <small>/${p.unit.replace('元/','')}</small>`
    : `${p.unit} <small>${stockLabel(p)}</small>`;
  document.getElementById('modalBox').innerHTML = `
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-media">${mediaInner}</div>
    <div class="modal-content">
      <div class="modal-cat">${fam.label} · ${p.type} · 货号 ${p.code}</div>
      <h3>${p.name}</h3>
      <table class="modal-table">
        ${p.specs.map(s=>`<tr><td>${s[0]}</td><td>${s[1]}</td></tr>`).join('')}
        <tr><td>库存状态</td><td>${stockLabel(p)}</td></tr>
      </table>
      <p class="modal-desc">${p.desc}</p>
      <div class="modal-actions">
        <button class="btn-add" data-id="${p.id}" data-added="${added}" style="flex:1">${added?'已加入选品单':'加入选品单'}</button>
        <div class="card-price" style="align-self:center; padding:0 12px;">${priceHtml}</div>
      </div>
    </div>`;
  document.getElementById('modalOverlay').dataset.open = 'true';
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.querySelector('.modal-actions .btn-add').addEventListener('click', ()=>{
    toggleSelect(p.id);
    closeModal();
  });
}
function closeModal(){ document.getElementById('modalOverlay').dataset.open = 'false'; }
document.getElementById('modalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'modalOverlay') closeModal();
});
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModal(); });

document.getElementById('searchInput').addEventListener('input', renderGrid);
document.getElementById('sortSelect').addEventListener('change', renderGrid);

renderChips();
renderGrid();
renderSelBar();
</script>

</body>
</html>
